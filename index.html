/* ============================================================
   Keepsake — Webfonts  ·  "Scrapbook" direction
   ------------------------------------------------------------
   Display : Shantell Sans  — modern hand-drawn sans for headings
             & emotional copy (legible, crafty, scrapbook-y).
   UI/Body : Public Sans    — humanist, highly legible, a close
             accessible cousin of NHS Frutiger.
   Fancy   : Kaushan Script — bouncy brush script for hero
             flourishes and sign-offs.
   Hand    : Caveat         — casual handwriting for signatures,
             photo captions and short notes.
   ------------------------------------------------------------
   NOTE: loaded from Google Fonts for portability. For
   production, self-host the .woff2 files and swap these
   @imports for local @font-face rules.
   ============================================================ */

@import url('https://fonts.googleapis.com/css2?family=Shantell+Sans:ital,wght@0,400;0,500;0,600;0,700;1,500;1,600&family=Public+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800&family=Kaushan+Script&family=Caveat:wght@500;600;700&display=swap');


/* ============================================================
   Keepsake — Colour tokens  ·  "Scrapbook" direction
   ------------------------------------------------------------
   Deep navy ink on warm ivory paper, with mustard-gold and
   powder-blue accents — the palette of a hand-made leaving
   card. Token NAMES are stable (the *_500 etc. slots are reused)
   so every component re-skins automatically; only values change.
   All text pairings meet WCAG 2.2 AA.
   ============================================================ */

:root {
  /* ---- Paper / warm neutrals (ivory backgrounds & borders) ---- */
  --paper-50:  #F7F2E6;   /* page background — warm ivory     */
  --paper-100: #EFE7D5;   /* sunken / alt surface             */
  --paper-200: #E3D7BE;   /* hairline borders                 */
  --paper-300: #D3C3A4;   /* stronger borders / dividers      */

  /* ---- Ink / navy + warm grey (text) ---- */
  --ink-900: #1F3050;     /* primary text + primary brand     */
  --ink-700: #3A4A63;     /* secondary text                   */
  --ink-500: #6C7588;     /* muted text / captions            */
  --ink-300: #A7AEBC;     /* disabled / placeholder           */

  --white:   #FFFFFF;

  /* ---- Primary — navy & slate (the "blue" slot) ---- */
  --blue-700: #15263F;    /* deepest navy                     */
  --blue-600: #1F3050;    /* primary — deep navy              */
  --blue-500: #5B7B9A;    /* slate (stitched-ribbon banner)   */
  --blue-200: #A9C4DC;    /* powder blue                      */
  --blue-100: #DCE7F1;    /* soft tint surface                */
  --blue-50:  #EEF3F8;

  /* ---- Love — warm brick red (hearts, "with love") ---- */
  --coral-700: #8F3D29;
  --coral-600: #B0543B;
  --coral-500: #C9694C;
  --coral-200: #EAC4B5;
  --coral-100: #F6E4DB;

  /* ---- Accent — mustard gold (balloons, stars, CTAs) ---- */
  --gold-600: #B07D1E;
  --gold-500: #E0A43B;    /* accent — pairs with navy text    */
  --gold-200: #F3D9A0;
  --gold-100: #FBEFD3;    /* soft tint surface                */

  /* ---- Support — sage (quiet variety in tags) ---- */
  --sage-600: #4F7A5C;
  --sage-500: #6E9A78;
  --sage-100: #E4EFE6;

  /* ---- Semantic raw ---- */
  --green-600: #2E7D5B;
  --green-100: #E2F1EA;
  --red-600:   #C0392B;
  --red-100:   #FBE6E3;
  --amber-600: #B07D1E;
  --amber-100: #FBEFD3;

  /* ======================================================
     Semantic aliases — reference these in components
     ====================================================== */

  /* surfaces */
  --surface-page:    var(--paper-50);
  --surface-card:    #FFFDF8;            /* warm off-white card  */
  --surface-raised:  #FFFDF8;
  --surface-sunken:  var(--paper-100);
  --surface-tint:    var(--blue-50);
  --surface-accent:  var(--gold-100);
  --surface-inverse: var(--ink-900);

  /* text */
  --text-strong:    var(--ink-900);
  --text-body:      var(--ink-700);
  --text-muted:     var(--ink-500);
  --text-disabled:  var(--ink-300);
  --text-on-accent: var(--white);       /* white on DARK accent surfaces */
  --text-on-primary:var(--white);
  --text-link:      var(--blue-600);

  /* borders */
  --border-subtle:  var(--paper-200);
  --border-default: var(--paper-300);
  --border-strong:  var(--ink-300);

  /* primary (navy) */
  --primary:        var(--blue-600);
  --primary-hover:  var(--blue-700);
  --primary-soft:   var(--blue-100);
  --primary-text:   var(--blue-700);

  /* accent (gold) — solids pair with NAVY ink, not white */
  --accent:         var(--gold-500);
  --accent-hover:   var(--gold-600);
  --accent-soft:    var(--gold-100);
  --accent-ink:     var(--ink-900);     /* text/icon colour on a gold fill */
  --accent-text:    #7E5610;            /* deep gold for text on ivory (AA) */

  /* highlight (gold) */
  --highlight:      var(--gold-500);
  --highlight-soft: var(--gold-100);

  /* love (brick red) */
  --love:           var(--coral-600);
  --love-soft:      var(--coral-100);

  /* semantic */
  --success:        var(--green-600);
  --success-soft:   var(--green-100);
  --danger:         var(--red-600);
  --danger-soft:    var(--red-100);
  --warning:        var(--amber-600);
  --warning-soft:   var(--amber-100);
  --info:           var(--blue-600);
  --info-soft:      var(--blue-100);

  /* focus */
  --focus-ring:        var(--blue-600);
  --focus-ring-offset: var(--surface-page);
}


/* ============================================================
   Keepsake — Typography tokens
   Display: Newsreader (serif) · UI/Body: Public Sans
   Accent : Caveat (handwritten)
   Type scale ~1.2 (minor third) tuned for warm, readable cards.
   ============================================================ */

:root {
  /* ---- Families ---- */
  --font-display: 'Shantell Sans', 'Comic Sans MS', system-ui, -apple-system, sans-serif;
  --font-sans:    'Public Sans', system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;
  --font-script:  'Caveat', 'Segoe Script', cursive;
  --font-fancy:   'Kaushan Script', 'Caveat', cursive;
  --font-body:    var(--font-sans);

  /* ---- Weights ---- */
  --weight-regular:  400;
  --weight-medium:   500;
  --weight-semibold: 600;
  --weight-bold:     700;
  --weight-extra:    800;

  /* ---- Size scale ---- */
  --text-xs:   0.75rem;   /* 12px — labels, meta            */
  --text-sm:   0.875rem;  /* 14px — secondary, captions     */
  --text-base: 1rem;      /* 16px — body                    */
  --text-md:   1.125rem;  /* 18px — lead body / form text   */
  --text-lg:   1.375rem;  /* 22px — card titles             */
  --text-xl:   1.75rem;   /* 28px — section headings        */
  --text-2xl:  2.25rem;   /* 36px — page headings           */
  --text-3xl:  3rem;      /* 48px — hero (small screens)    */
  --text-4xl:  4rem;      /* 64px — hero (large screens)    */
  --text-5xl:  5.25rem;   /* 84px — display moments         */

  /* ---- Line heights ---- */
  --leading-tight:   1.1;
  --leading-snug:    1.25;
  --leading-normal:  1.5;
  --leading-relaxed: 1.65;

  /* ---- Letter spacing ---- */
  --tracking-tight:  -0.02em;
  --tracking-snug:   -0.01em;
  --tracking-normal: 0;
  --tracking-wide:   0.04em;
  --tracking-caps:   0.08em;  /* eyebrow / overline labels  */
}


/* ============================================================
   Keepsake — Spacing, radius, shadow, motion tokens
   4px base grid. Warm-tinted, soft layered shadows so cards
   feel like paper resting on paper.
   ============================================================ */

:root {
  /* ---- Spacing (4px base) ---- */
  --space-0:  0;
  --space-1:  0.25rem;  /* 4  */
  --space-2:  0.5rem;   /* 8  */
  --space-3:  0.75rem;  /* 12 */
  --space-4:  1rem;     /* 16 */
  --space-5:  1.5rem;   /* 24 */
  --space-6:  2rem;     /* 32 */
  --space-7:  2.5rem;   /* 40 */
  --space-8:  3rem;     /* 48 */
  --space-9:  4rem;     /* 64 */
  --space-10: 5rem;     /* 80 */
  --space-12: 7rem;     /* 112 */

  /* ---- Radius ---- */
  --radius-xs:   4px;
  --radius-sm:   8px;
  --radius-md:   12px;
  --radius-lg:   18px;   /* default card                   */
  --radius-xl:   26px;   /* hero / large surfaces          */
  --radius-pill: 999px;

  /* ---- Borders ---- */
  --border-width: 1px;
  --border-width-strong: 2px;

  /* ---- Shadows (warm-tinted) ---- */
  --shadow-xs:  0 1px 2px rgba(33, 27, 20, 0.06);
  --shadow-sm:  0 1px 3px rgba(33, 27, 20, 0.08), 0 1px 2px rgba(33, 27, 20, 0.06);
  --shadow-md:  0 4px 12px rgba(33, 27, 20, 0.08), 0 2px 4px rgba(33, 27, 20, 0.05);
  --shadow-lg:  0 12px 28px rgba(33, 27, 20, 0.12), 0 4px 8px rgba(33, 27, 20, 0.06);
  --shadow-xl:  0 24px 56px rgba(33, 27, 20, 0.16), 0 8px 16px rgba(33, 27, 20, 0.08);
  /* warm focus glow */
  --shadow-focus: 0 0 0 3px var(--surface-page), 0 0 0 5px var(--focus-ring);

  /* ---- Motion ---- */
  --ease-out:   cubic-bezier(0.22, 1, 0.36, 1);   /* @kind other */
  --ease-in-out:cubic-bezier(0.65, 0, 0.35, 1);   /* @kind other */
  --ease-spring:cubic-bezier(0.34, 1.56, 0.64, 1);/* @kind other */
  --dur-fast:   140ms;                             /* @kind other */
  --dur-base:   240ms;                             /* @kind other */
  --dur-slow:   420ms;                             /* @kind other */

  /* ---- Layout ---- */
  --container-sm: 640px;
  --container-md: 880px;
  --container-lg: 1120px;
  --container-xl: 1320px;
}


/* ============================================================
   Keepsake — Base element defaults & utilities
   Lightweight, token-driven. Sets the warm paper canvas,
   accessible focus rings and a few helper classes used across
   specimen cards and UI kits.
   ============================================================ */

*,
*::before,
*::after { box-sizing: border-box; }

html { -webkit-text-size-adjust: 100%; }

body {
  margin: 0;
  font-family: var(--font-sans);
  font-size: var(--text-base);
  line-height: var(--leading-normal);
  color: var(--text-body);
  background: var(--surface-page);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

h1, h2, h3, h4 {
  font-family: var(--font-display);
  color: var(--text-strong);
  font-weight: var(--weight-semibold);
  line-height: var(--leading-snug);
  letter-spacing: var(--tracking-normal);
  margin: 0 0 var(--space-4);
  text-wrap: balance;
}

p { margin: 0 0 var(--space-4); text-wrap: pretty; }

a { color: var(--text-link); text-decoration-thickness: 1px; text-underline-offset: 2px; }

/* Accessible focus — visible, warm, consistent */
:where(a, button, input, textarea, select, [tabindex]):focus-visible {
  outline: none;
  box-shadow: var(--shadow-focus);
  border-radius: var(--radius-sm);
}

/* Eyebrow / overline label */
.ks-eyebrow {
  font-family: var(--font-sans);
  font-size: var(--text-sm);
  font-weight: var(--weight-bold);
  letter-spacing: var(--tracking-caps);
  text-transform: uppercase;
  color: var(--accent-text);
}

/* Handwritten accent */
.ks-script {
  font-family: var(--font-script);
  font-weight: var(--weight-bold);
  color: var(--accent);
}

/* Screen-reader-only (WCAG helper) */
.sr-only {
  position: absolute;
  width: 1px; height: 1px;
  padding: 0; margin: -1px;
  overflow: hidden; clip: rect(0,0,0,0);
  white-space: nowrap; border: 0;
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.001ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.001ms !important;
    scroll-behavior: auto !important;
  }
}


/* ============================================================
   Keepsake — live app styles (built on the design tokens)
   ============================================================ */

body { margin: 0; background: var(--surface-page); color: var(--text-body); }
* { -webkit-tap-highlight-color: transparent; }
img { max-width: 100%; }

.ks-app { min-height: 100vh; display: flex; flex-direction: column; }
.ks-ink-accent { color: var(--accent); }
.ks-main { flex: 1; }

/* ---------- buttons ---------- */
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  font-family: var(--font-sans); font-weight: 700; font-size: var(--text-base);
  border: 1px solid transparent; border-radius: var(--radius-pill); cursor: pointer;
  padding: 11px 20px; line-height: 1; transition: background var(--dur-fast), transform var(--dur-fast), box-shadow var(--dur-fast); white-space: nowrap; }
.btn:active { transform: translateY(1px); }
.btn i, .btn svg { width: 18px; height: 18px; }
.btn--accent { background: var(--accent); color: var(--accent-ink); }
.btn--accent:hover { background: var(--accent-hover); }
.btn--primary { background: var(--primary); color: var(--white); }
.btn--primary:hover { background: var(--primary-hover); }
.btn--outline { background: var(--surface-card); color: var(--text-strong); border-color: var(--border-default); }
.btn--outline:hover { background: var(--surface-sunken); }
.btn--ghost { background: transparent; color: var(--text-body); }
.btn--ghost:hover { background: var(--surface-sunken); }
.btn--lg { padding: 14px 26px; font-size: var(--text-md); }
.btn--sm { padding: 8px 14px; font-size: var(--text-sm); }
.btn--block { width: 100%; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* ---------- top nav ---------- */
.ks-nav { position: sticky; top: 0; z-index: 50; background: rgba(247,242,230,0.88);
  backdrop-filter: blur(12px); border-bottom: 1px solid var(--border-subtle); }
.ks-nav__inner { max-width: var(--container-lg); margin: 0 auto; display: flex; align-items: center;
  gap: var(--space-4); padding: 12px var(--space-5); }
.ks-nav__brand { display: flex; align-items: center; gap: 10px; font-family: var(--font-display);
  font-weight: 600; font-size: 22px; color: var(--text-strong); letter-spacing: -0.02em;
  background: none; border: 0; cursor: pointer; padding: 0; }
.ks-nav__brand img { width: 30px; height: 30px; }
.ks-nav__links { display: flex; gap: 4px; margin-left: auto; }
.ks-nav__links a { font-family: var(--font-sans); font-size: var(--text-base); font-weight: 600;
  color: var(--text-body); background: transparent; border: none; cursor: pointer; padding: 9px 14px;
  border-radius: var(--radius-pill); transition: background var(--dur-fast), color var(--dur-fast); text-decoration: none; }
.ks-nav__links a:hover { background: var(--surface-sunken); color: var(--text-strong); }
.ks-nav__links a.is-active { background: var(--accent-soft); color: var(--accent-text); }
.ks-nav__deadline { display: inline-flex; align-items: center; gap: 7px; font-size: var(--text-sm);
  font-weight: 600; color: var(--text-muted); background: var(--surface-card); border: 1px solid var(--border-subtle);
  padding: 8px 13px; border-radius: var(--radius-pill); white-space: nowrap; }
.ks-nav__deadline i { width: 16px; height: 16px; color: var(--accent); }
.ks-nav__deadline b { color: var(--text-strong); font-variant-numeric: tabular-nums; }

/* ---------- sections ---------- */
.ks-section { max-width: var(--container-lg); margin: 0 auto; padding: var(--space-9) var(--space-5); }
.ks-section--narrow { max-width: 780px; }
.ks-section__head { display: flex; align-items: flex-end; justify-content: space-between; gap: 20px;
  margin-bottom: var(--space-7); flex-wrap: wrap; }

.ks-heading { }
.ks-heading--center { text-align: center; }
.ks-heading__eyebrow { margin: 0 0 8px; }
.ks-heading__title { font-family: var(--font-display); font-weight: 600; letter-spacing: -0.02em;
  font-size: var(--text-2xl); color: var(--text-strong); margin: 0; line-height: 1.1; }
.ks-heading__title em { font-style: normal; color: var(--accent); }
.ks-heading__sub { color: var(--text-muted); margin: 10px auto 0; max-width: 52ch; }
.ks-heading--center .ks-heading__sub { margin-inline: auto; }

/* ---------- hero ---------- */
.ks-hero { position: relative; overflow: hidden; text-align: center;
  background:
    radial-gradient(120% 90% at 50% -10%, var(--coral-100) 0%, rgba(251,228,218,0) 55%),
    radial-gradient(90% 70% at 88% 8%, var(--gold-100) 0%, rgba(251,239,211,0) 50%),
    var(--surface-page); }
.ks-hero__inner { position: relative; z-index: 2; max-width: 820px; margin: 0 auto;
  padding: var(--space-10) var(--space-5) var(--space-9); }
.ks-hero__confetti { position: absolute; inset: 0; z-index: 1; pointer-events: none; }
.ks-hero__confetti span { position: absolute; opacity: 0.7; }
.ks-hero__title { font-family: var(--font-display); font-weight: 500; line-height: 1.02;
  letter-spacing: -0.03em; font-size: clamp(3rem, 8vw, 5.25rem); color: var(--text-strong); margin: 8px 0 0; }
.ks-hero__sub { font-size: var(--text-md); color: var(--text-body); line-height: 1.6;
  max-width: 42ch; margin: var(--space-4) auto 0; }
.ks-hero__timer { margin-top: var(--space-7); display: flex; flex-direction: column; align-items: center; gap: 12px; }
.ks-hero__deadline { display: inline-flex; align-items: center; gap: 8px; font-size: var(--text-base);
  color: var(--text-muted); margin: 0; }
.ks-hero__deadline i { width: 18px; height: 18px; color: var(--accent); }
.ks-hero__deadline strong { color: var(--text-strong); }
.ks-hero__cta { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; margin-top: var(--space-7); }
.ks-hero__stats { display: flex; align-items: center; justify-content: center; gap: 18px; margin-top: var(--space-7); flex-wrap: wrap; }
.ks-hero__stats b { font-family: var(--font-display); font-size: 28px; font-weight: 600; color: var(--text-strong); margin-right: 7px; }
.ks-hero__stats span { color: var(--text-muted); }
.ks-hero__stats > div { display: flex; align-items: baseline; }
.ks-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--border-strong); }

/* ---------- countdown ---------- */
.ks-count { display: inline-flex; gap: 10px; }
.ks-count__unit { background: var(--accent); color: var(--accent-ink); border-radius: var(--radius-md);
  min-width: 70px; padding: 12px 10px 8px; text-align: center; box-shadow: var(--shadow-sm); }
.ks-count__num { font-family: var(--font-display); font-weight: 700; font-size: 30px; line-height: 1; font-variant-numeric: tabular-nums; }
.ks-count__lbl { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; margin-top: 6px; opacity: 0.8; }

/* ---------- steps ---------- */
.ks-steps { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--space-5); margin-top: var(--space-7); }
.ks-step { background: var(--surface-card); border: 1px solid var(--border-subtle); border-radius: var(--radius-lg);
  box-shadow: var(--shadow-sm); padding: var(--space-6) var(--space-5); text-align: center; position: relative; }
.ks-step__num { position: absolute; top: -14px; left: 50%; transform: translateX(-50%); width: 28px; height: 28px;
  border-radius: 50%; background: var(--accent); color: var(--accent-ink); font-weight: 700; font-size: 14px;
  display: grid; place-items: center; }
.ks-step__icon { width: 56px; height: 56px; border-radius: var(--radius-lg); background: var(--blue-50);
  color: var(--primary); display: grid; place-items: center; margin: 8px auto var(--space-4); }
.ks-step__icon i { width: 26px; height: 26px; }
.ks-step__title { font-family: var(--font-display); font-size: var(--text-lg); margin: 0 0 6px; }
.ks-step__desc { font-size: var(--text-base); color: var(--text-muted); margin: 0; line-height: 1.5; }

/* ---------- card masthead ---------- */
.ks-cardart { padding: var(--space-9) var(--space-5) var(--space-6); text-align: center;
  background: radial-gradient(120% 90% at 50% -10%, var(--blue-50) 0%, rgba(232,240,248,0) 58%), var(--surface-page); }
.ks-cardart__frame { display: block; width: 100%; max-width: 720px; height: auto; margin: 0 auto;
  border-radius: var(--radius-xl); box-shadow: var(--shadow-lg); }
.ks-cardart__caption { margin: var(--space-6) auto 0; }
.ks-cardart__name { font-family: var(--font-display); font-weight: 600; letter-spacing: -0.02em;
  font-size: var(--text-xl); color: var(--text-strong); margin: 0; }
.ks-cardart__role { font-size: var(--text-base); color: var(--text-muted); margin: 4px 0 0; }
.ks-cardart__journey { display: inline-flex; align-items: center; gap: 14px; flex-wrap: wrap;

  adminEmail: "precious.omorogbe@nhs.net",

  /* Your name — shown in the organiser area. */
  organiserName: "Precious Omorogbe",

  /* ---- 3. THE OCCASION ---------------------------------- */
  honoree: {
    firstName: "Michael",
    fullName:  "Michael Ihemadu",
    role:      "Assistant Service Manager · Health Visiting",
    team:      "Health Visiting"
  },
  deadline: "2026-07-01T13:00:00",   // submissions close (local time)

  /* ---- 3b. THE COLLECTION (optional) --------------------
     A link where colleagues can chip in towards a leaving
     gift. Paste your Monzo.me (or any payment) link below.
     Leave `url` blank to hide the contribution section.
  ---------------------------------------------------------- */
  gift: {
    url:   "https://monzo.me/paomorogbe?h=birQhl&account_type=personal",
    title: "Chip in for Michael's gift",
    blurb: "Alongside your message, you're warmly invited to contribute towards a leaving gift. Anything you can give is appreciated — there's no expected amount.",
    cta:   "Contribute via Monzo",
    note:  "Payments go securely to Precious Omorogbe via Monzo. Contributing is entirely optional."
  },

  /* ---- 4. DEMO MODE PASSWORD ----------------------------
     Only used when Firebase is not configured (preview).
     In a real deployment the real password is in Firebase.
  ---------------------------------------------------------- */
  demoPassword: "demo"
};

<script>
/* ============================================================
   KEEPSAKE — app logic (vanilla JS, no build step)
   Runs in LIVE mode when Firebase is configured in config.js,
   otherwise in local DEMO mode (saves to this browser).
   ============================================================ */
(function () {
  "use strict";

  var CFG = window.KEEPSAKE_CONFIG || {};
  var HON = CFG.honoree || { firstName: "Michael", fullName: "Michael", role: "", team: "" };
  var GIFT = (CFG.gift && CFG.gift.url) ? CFG.gift : null;
  var LIVE = !!(CFG.firebase && CFG.firebase.apiKey);

  /* ---------------- tiny helpers ---------------- */
  var app = document.getElementById("app");
  function esc(s) {
    return String(s == null ? "" : s)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
  }
  function icons() { if (window.lucide) { try { window.lucide.createIcons(); } catch (e) {} } }
  var AV_COLORS = ["#1F3050", "#5B7B9A", "#B0543B", "#E0A43B", "#4F7A5C", "#8F3D29"];
  function avatarColor(name) {
    var n = 0; name = name || "?";
    for (var i = 0; i < name.length; i++) n = (n + name.charCodeAt(i)) % AV_COLORS.length;
    return AV_COLORS[n];
  }
  function initials(name) {
    var p = String(name || "?").trim().split(/\s+/);
    return ((p[0] || "?")[0] + (p.length > 1 ? p[p.length - 1][0] : "")).toUpperCase();
  }
  function avatar(name, src, sm) {
    var cls = "ks-avatar" + (sm ? " ks-avatar--sm" : "");
    if (src) return '<span class="' + cls + '"><img src="' + esc(src) + '" alt=""></span>';
    return '<span class="' + cls + '" style="background:' + avatarColor(name) + '">' + esc(initials(name)) + "</span>";
  }
  var toastTimer;
  function toast(msg) {
    var old = document.getElementById("ks-toast"); if (old) old.remove();
    var t = document.createElement("div");
    t.id = "ks-toast"; t.className = "ks-toast";
    t.innerHTML = '<i data-lucide="check-circle"></i>' + esc(msg);
    document.body.appendChild(t); icons();
    clearTimeout(toastTimer); toastTimer = setTimeout(function () { t.remove(); }, 2600);
  }

  /* ---------------- image compression ---------------- */
  function compressImage(file) {
    return new Promise(function (resolve, reject) {
      if (!file || !/^image\//.test(file.type)) { reject(new Error("Not an image")); return; }
      var img = new Image(), url = URL.createObjectURL(file);
      img.onload = function () {
        URL.revokeObjectURL(url);
        var max = 1280, w = img.width, h = img.height;
        if (w > h && w > max) { h = Math.round(h * max / w); w = max; }
        else if (h > max) { w = Math.round(w * max / h); h = max; }
        function enc(q) {
          var c = document.createElement("canvas"); c.width = w; c.height = h;
          c.getContext("2d").drawImage(img, 0, 0, w, h);
          return c.toDataURL("image/jpeg", q);
        }
        var data = enc(0.72);
        if (data.length > 900000) data = enc(0.55);
        resolve(data);
      };
      img.onerror = function () { URL.revokeObjectURL(url); reject(new Error("Could not read image")); };
      img.src = url;
    });
  }

  /* ============================================================
     DATA STORE  (LIVE = Firestore · DEMO = localStorage)
     ============================================================ */
  var store = (function () {
    var subs = [], cache = [];
    function notify() { subs.forEach(function (cb) { cb(cache.slice()); }); }

    if (LIVE) {
      firebase.initializeApp(CFG.firebase);
      var db = firebase.firestore();
      var col = db.collection("messages");
      col.orderBy("created", "desc").onSnapshot(function (snap) {
        cache = snap.docs.map(function (d) { var o = d.data(); o.id = d.id; return o; });
        notify();
      }, function (err) { console.error(err); toast("Connection issue — retrying…"); });
      return {
        live: true,
        subscribe: function (cb) { subs.push(cb); cb(cache.slice()); },
        add: function (data) {
          data.status = "pending"; data.created = Date.now();
          return col.add(data);
        },
        update: function (id, fields) { return col.doc(id).update(fields); },
        remove: function (id) { return col.doc(id).delete(); }
      };
    }

    /* ---- DEMO ---- */
    var KEY = "keepsake_messages_v1";
    function load() { try { return JSON.parse(localStorage.getItem(KEY)) || null; } catch (e) { return null; } }
    function save() { localStorage.setItem(KEY, JSON.stringify(cache)); }
    cache = load();
    if (!cache) { cache = seed(); save(); }
    cache.sort(function (a, b) { return b.created - a.created; });
    window.addEventListener("storage", function (e) { if (e.key === KEY) { cache = load() || []; cache.sort(function (a, b) { return b.created - a.created; }); notify(); } });
    function uid() { return "m" + Date.now() + Math.random().toString(36).slice(2, 6); }
    return {
      live: false,
      subscribe: function (cb) { subs.push(cb); cb(cache.slice()); },
      add: function (data) {
        data.id = uid(); data.status = "pending"; data.created = Date.now();
        cache.unshift(data); save(); notify(); return Promise.resolve();
      },
      update: function (id, fields) {
        cache = cache.map(function (m) { return m.id === id ? Object.assign({}, m, fields) : m; });
        save(); notify(); return Promise.resolve();
      },
      remove: function (id) {
        cache = cache.filter(function (m) { return m.id !== id; });
        save(); notify(); return Promise.resolve();
      }
    };
  })();

  function seed() {
    var now = Date.now();
    function m(o, mins) { o.created = now - mins * 60000; return o; }
    return [
      m({ id: "s1", name: "Priya Sharma", team: "Health Visiting", status: "approved", show: true,
        message: "Working alongside you this past year has been one of the real joys of my time here. You stayed calm in every storm and always had time for someone who was panicking. Thank you, Michael." }, 60),
      m({ id: "s2", name: "Tom Okafor", team: "School Nursing", status: "approved", show: true,
        message: "The team simply won't be the same without you. Wishing you every happiness in the next chapter." }, 120),
      m({ id: "s3", name: "Sara Lin", team: "Safeguarding", status: "approved", show: true, signature: true,
        message: "Take care, Michael. You'll be so missed. x" }, 180),
      m({ id: "s4", name: "Dawn Reilly", team: "Business Support", status: "approved", show: true,
        message: "A true gentleman and simply the best colleague a team could ask for. Best of luck in the new role!" }, 240),
      m({ id: "s5", name: "James Patel", team: "Early Years", status: "approved", show: true,
        message: "From my very first week you made me feel welcome. I learned more from you in a year than I'd have managed in five." }, 300),
      m({ id: "s6", name: "Aoife Byrne", team: "IT Services", status: "approved", show: true,
        message: "Even when our systems were on fire you'd bring tea and good humour. Enjoy the new challenge, you've earned it." }, 360),
      m({ id: "s7", name: "Olu Adeyemi", team: "School Nursing", status: "pending", show: true,
        message: "Wishing you all the very best for what comes next. Thank you for everything." }, 20),
      m({ id: "s8", name: "Rosa Mendez", team: "Duty Team", status: "pending", show: true,
        message: "We'll raise a glass to you at the leaving do. Cheers to you, Michael!" }, 8)
    ];
  }

  /* ============================================================
     AUTH  (LIVE = Firebase Auth · DEMO = session flag)
     ============================================================ */
  var auth = (function () {
    var subs = [], isAdmin = false, label = "";
    function notify() { subs.forEach(function (cb) { cb(isAdmin); }); }
    if (LIVE) {
      var fa = firebase.auth();
      fa.onAuthStateChanged(function (u) { isAdmin = !!u; label = u ? u.email : ""; notify(); });
      return {
        subscribe: function (cb) { subs.push(cb); cb(isAdmin); },
        get isAdmin() { return isAdmin; },
        get label() { return label; },
        login: function (pw) { return fa.signInWithEmailAndPassword(CFG.adminEmail, pw); },
        logout: function () { return fa.signOut(); }
      };
    }
    isAdmin = sessionStorage.getItem("keepsake_admin") === "1";
    label = "Demo organiser";
    return {
      subscribe: function (cb) { subs.push(cb); cb(isAdmin); },
      get isAdmin() { return isAdmin; },
      get label() { return label; },
      login: function (pw) {
        if (pw === (CFG.demoPassword || "demo")) { isAdmin = true; sessionStorage.setItem("keepsake_admin", "1"); notify(); return Promise.resolve(); }
        return Promise.reject(new Error("Wrong password"));
      },
      logout: function () { isAdmin = false; sessionStorage.removeItem("keepsake_admin"); notify(); return Promise.resolve(); }
    };
  })();

  /* ============================================================
     STATE + ROUTER
     ============================================================ */
  var state = { screen: "home", messages: [], isAdmin: auth.isAdmin, adminTab: "submissions", booted: false };

  function routeFromHash() {
    var h = (location.hash || "#home").replace("#", "");
    if (h === "michael") h = "view";
    if (["home", "submit", "card", "admin", "view"].indexOf(h) === -1) h = "home";
    return h;
  }
  function go(screen) { if (location.hash !== "#" + screen) location.hash = "#" + screen; else render(); }

  store.subscribe(function (msgs) {
    state.messages = msgs;
    if (state.booted && state.screen !== "submit") render();
  });
  auth.subscribe(function (a) {
    state.isAdmin = a;
    if (state.booted) render();
  });

  window.addEventListener("hashchange", function () {
    state.screen = routeFromHash();
    window.scrollTo(0, 0);
    render();
  });

  /* ---------------- deadline helpers ---------------- */
  function deadlineMs() { return new Date(CFG.deadline).getTime(); }
  function isClosed() { return Date.now() > deadlineMs(); }
  function fmtDeadline() {
    var d = new Date(CFG.deadline);
    var time = d.toLocaleTimeString("en-GB", { hour: "numeric", minute: "2-digit" });
    var date = d.toLocaleDateString("en-GB", { day: "numeric", month: "long" });
    return time + ", " + date;
  }

  /* ---------------- derived ---------------- */
  function cardMessages() { return state.messages.filter(function (m) { return m.status === "approved" && m.show !== false; }); }

  /* ============================================================
     SCREENS
     ============================================================ */
  function navBar() {
    var s = state.screen;
    function link(k, label) { return '<a href="#' + k + '" class="' + (s === k ? "is-active" : "") + '">' + label + "</a>"; }
    return '' +
      '<header class="ks-nav"><div class="ks-nav__inner">' +
        '<a class="ks-nav__brand" href="#home"><img src="data:image/svg+xml,%3Csvg%20width%3D%2264%22%20height%3D%2264%22%20viewBox%3D%220%200%2064%2064%22%20fill%3D%22none%22%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20role%3D%22img%22%20aria-label%3D%22Keepsake%22%3E%0A%20%20%3Crect%20x%3D%222%22%20y%3D%222%22%20width%3D%2260%22%20height%3D%2260%22%20rx%3D%2216%22%20fill%3D%22%23005EB8%22%3E%3C%2Frect%3E%0A%20%20%3Cpath%20d%3D%22M14%2022%20L32%2033%20L50%2022%22%20stroke%3D%22%23FCF9F3%22%20stroke-width%3D%223.2%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%20fill%3D%22none%22%20opacity%3D%220.55%22%3E%3C%2Fpath%3E%0A%20%20%3Cpath%20d%3D%22M32%2047.5c-1%200-9.8-5.3-12.4-9.8a6.6%206.6%200%200%201%2011.1-7%201.6%201.6%200%200%200%202.6%200%206.6%206.6%200%200%201%2011.1%207C41.8%2042.2%2033%2047.5%2032%2047.5Z%22%20fill%3D%22%23E0684B%22%3E%3C%2Fpath%3E%0A%3C%2Fsvg%3E" alt=""> Keepsake</a>' +
        '<nav class="ks-nav__links">' + link("home", "Home") + link("submit", "Leave a message") + link("card", "The card") + "</nav>" +
        '<span class="ks-nav__deadline" id="navTimer"><i data-lucide="calendar-clock"></i> ' +
          (isClosed() ? "Submissions closed" : 'Closes in <b id="navCount">…</b>') + "</span>" +
      "</div></header>";
  }

  function footer() {
    return '' +
      '<footer class="ks-footer"><div class="ks-footer__inner">' +
        '<span class="ks-footer__brand"><img src="data:image/svg+xml,%3Csvg%20width%3D%2264%22%20height%3D%2264%22%20viewBox%3D%220%200%2064%2064%22%20fill%3D%22none%22%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20role%3D%22img%22%20aria-label%3D%22Keepsake%22%3E%0A%20%20%3Crect%20x%3D%222%22%20y%3D%222%22%20width%3D%2260%22%20height%3D%2260%22%20rx%3D%2216%22%20fill%3D%22%23005EB8%22%3E%3C%2Frect%3E%0A%20%20%3Cpath%20d%3D%22M14%2022%20L32%2033%20L50%2022%22%20stroke%3D%22%23FCF9F3%22%20stroke-width%3D%223.2%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%20fill%3D%22none%22%20opacity%3D%220.55%22%3E%3C%2Fpath%3E%0A%20%20%3Cpath%20d%3D%22M32%2047.5c-1%200-9.8-5.3-12.4-9.8a6.6%206.6%200%200%201%2011.1-7%201.6%201.6%200%200%200%202.6%200%206.6%206.6%200%200%201%2011.1%207C41.8%2042.2%2033%2047.5%2032%2047.5Z%22%20fill%3D%22%23E0684B%22%3E%3C%2Fpath%3E%0A%3C%2Fsvg%3E" alt="" width="22" height="22"> Keepsake</span>' +
        '<p class="ks-footer__text">A private collection of messages for ' + esc(HON.firstName) +
        '. Shared only with the team and with ' + esc(HON.firstName) + '.</p>' +
        '<a class="btn btn--ghost btn--sm" href="#admin" style="margin-left:auto"><i data-lucide="lock"></i> Organiser</a>' +
      "</div></footer>";
  }

  function modeBar() {
    if (LIVE) return "";
    return '<div class="ks-modebar"><i data-lucide="info" style="width:14px;height:14px;vertical-align:-2px"></i> ' +
      "Demo mode — messages save to this browser only. Add your Firebase keys in config.js to go live. " +
      "(Organiser password here is <b>demo</b>.)</div>";
  }

  function homeScreen() {
    var approved = cardMessages();
    var photos = approved.filter(function (m) { return m.photo; }).length;
    var teams = {}; approved.forEach(function (m) { if (m.team) teams[m.team] = 1; });
    var teamCount = Object.keys(teams).length;
    var confettiCols = ["var(--coral-500)", "var(--gold-500)", "var(--blue-500)", "var(--sage-500)", "var(--coral-200)", "var(--gold-200)"];
    var conf = "";
    for (var i = 0; i < 22; i++) {
      conf += '<span style="left:' + (i * 4.5 + (i % 3) * 2) + "%;top:" + (((i * 37) % 90) + 4) + "%;background:" +
        confettiCols[i % confettiCols.length] + ";transform:rotate(" + ((i * 53) % 360) + "deg);border-radius:" +
        (i % 2 ? "2px" : "50%") + ";width:" + (i % 4 ? "10px" : "14px") + ";height:" + (i % 3 ? "10px" : "6px") + '"></span>';
    }
    var avs = approved.slice(0, 7).map(function (m, i) {

    return '' +
      '<section class="ks-hero"><div class="ks-hero__confetti" aria-hidden="true">' + conf + "</div>" +
        '<div class="ks-hero__inner">' +
          '<p class="ks-eyebrow">A fond farewell · ' + esc(HON.team) + "</p>" +

          '<p class="ks-hero__sub">A collection of messages and well wishes from across ' + esc(HON.team) +

          '<div class="ks-hero__timer">' + countdownHtml() +
            '<p class="ks-hero__deadline"><i data-lucide="calendar-clock"></i> ' +
              (isClosed() ? "Submissions are now closed" : "Submissions close <strong>" + fmtDeadline() + "</strong>") + "</p>" +
          "</div>" +
          '<div class="ks-hero__cta">' +
            (isClosed() ? "" : '<a class="btn btn--accent btn--lg" href="#submit"><i data-lucide="pen-line"></i> Leave a message</a>') +
            '<a class="btn btn--outline btn--lg" href="#card"><i data-lucide="book-heart"></i> View the card</a>' +
          "</div>" +
          '<div class="ks-hero__stats">' +
            "<div><b>" + approved.length + "</b><span>messages</span></div><div class=\"ks-dot\"></div>" +
            "<div><b>" + photos + "</b><span>photos</span></div><div class=\"ks-dot\"></div>" +
            "<div><b>" + teamCount + "</b><span>teams</span></div>" +
          "</div>" +
          (approved.length ? '<div class="ks-hero__stats" style="margin-top:var(--space-6)">' + avs + "</div>" : "") +
        "</div></section>" +

      '<section class="ks-section ks-section--narrow">' +
        '<div class="ks-heading ks-heading--center"><p class="ks-eyebrow ks-heading__eyebrow">How it works</p>' +

          step("1", "pen-line", "Write your message", "Share a few warm words to send " + esc(HON.firstName) + " on his way.") +

  function giftSection(mode) {

      '<span class="ks-gift__mark"><i data-lucide="gift"></i></span>' +
      '<div class="ks-gift__body">' +
        '<p class="ks-eyebrow">A little something extra</p>' +
        '<h2 class="ks-gift__title">' + esc(GIFT.title || ("Chip in for " + HON.firstName + "'s gift")) + '</h2>' +
        '<p class="ks-gift__text">' + esc(GIFT.blurb || "") + '</p>' +
        '<a class="btn btn--accent btn--lg" href="' + esc(GIFT.url) + '" target="_blank" rel="noopener">' +
          '<i data-lucide="heart-handshake"></i> ' + esc(GIFT.cta || "Contribute") + '</a>' +

  function countdownHtml() {

  /* ---------------- submit ---------------- */
  var formState = { name: "", team: "", message: "", show: true, photo: null };
  function submitScreen() {
    if (isClosed()) {
      return wrapNarrow(
        heading("center", "Leave a message", "Submissions have <em>closed</em>") +
        '<div class="ks-closed"><p><b>Thank you!</b> Submissions for the card closed on ' +
          esc(fmtDeadline()) + '.</p><a class="btn btn--accent" href="#card"><i data-lucide="book-heart"></i> See the finished card</a></div>') + giftSection();
    }
    return wrapNarrow(
      heading("center", "Leave a message", "Share a few <em>warm words</em>", "Required fields are marked with an asterisk. Everything else is optional.") +
      '<form class="ks-form" id="msgForm" novalidate>' +
        '<div class="ks-form__row">' +
          field("Your name", "*", '<input class="ks-input" id="f-name" placeholder="e.g. Priya Sharma" value="' + esc(formState.name) + '">', "e-name") +
          field("Team or role", "opt", '<input class="ks-input" id="f-team" placeholder="e.g. ' + esc(HON.team) + '" value="' + esc(formState.team) + '">') +
        "</div>" +
        field("Leaving message", "*",
          '<textarea class="ks-textarea" id="f-message" maxlength="600" placeholder="What would you like to say to ' + esc(HON.firstName) + '?">' + esc(formState.message) + "</textarea>" +
          '<div class="ks-field__count" id="f-count">0 / 600</div>', "e-message") +
        '<div class="ks-field"><span class="ks-field__label">Photo <span class="ks-field__opt">Optional</span></span>' +
          '<div id="dropZone">' + dropInner() + "</div></div>" +
        '<label class="ks-check"><input type="checkbox" id="f-show" ' + (formState.show ? "checked" : "") + ">" +
          '<span><span class="ks-check__t">Show my message on ' + esc(HON.firstName) + "'s final card</span>" +
          '<br><span class="ks-check__d">If unchecked, only the organiser will see it.</span></span></label>' +
        '<div class="ks-form__actions">' +
          '<a class="btn btn--ghost" href="#home">Cancel</a>' +
          '<button class="btn btn--accent btn--lg" type="submit" id="f-submit"><i data-lucide="send"></i> Add my message</button>' +
        "</div>" +
        giftSection("attached") +
      "</form>");
  }
  function dropInner() {
    if (formState.photo) {
      return '<div class="ks-drop__preview"><img src="' + esc(formState.photo) + '" alt="preview">' +
        '<button type="button" class="btn btn--outline btn--sm ks-drop__clear" id="dropClear"><i data-lucide="x"></i> Remove</button></div>';
    }
    return '<label class="ks-drop" id="dropLabel"><i data-lucide="image-plus"></i>' +
      '<p class="ks-drop__hint">Tap to choose a photo, or drag one here</p>' +
      '<input type="file" accept="image/*" id="f-photo" hidden></label>';
  }
  function successScreen(name) {
    return wrapNarrow(
      '<div class="ks-success"><div class="ks-success__icon"><i data-lucide="check"></i></div>' +
        "<h1 class=\"ks-success__title\">Thank you, " + esc(name) + "!</h1>" +
        '<p class="ks-success__sub">Your message has been added to ' + esc(HON.firstName) +
          "'s card. It will appear once the organiser approves it.</p>" +
        '<div class="ks-success__actions">' +
          '<a class="btn btn--accent btn--lg" href="#card"><i data-lucide="book-heart"></i> See the card</a>' +
          '<button class="btn btn--outline btn--lg" id="addAnother">Add another</button>' +
        "</div></div>");
  }

  /* ---------------- the card ---------------- */

      '<nav class="ks-admin__nav">' +
        '<button data-tab="submissions" class="' + (tab === "submissions" ? "is-active" : "") + '"><i data-lucide="inbox"></i> Submissions' + (pending.length ? '<span class="ks-admin__count">' + pending.length + "</span>" : "") + "</button>" +

        "</p></div></div>";

  /* ============================================================
     RENDER + EVENTS
     ============================================================ */
  function render() {
    var s = state.screen;
    var html;
    if (s === "admin") {
      html = modeBar() + (state.isAdmin ? adminScreen() : navBar() + '<main class="ks-main">' + loginScreen() + "</main>" + footer());
    } else if (s === "view") {
      html = '<div class="ks-app ks-app--view">' +
        '<header class="ks-viewbar"><span class="ks-viewbar__brand"><img src="assets/logo-mark.svg" alt="" width="26" height="26"> Keepsake</span></header>' +
        '<main class="ks-main">' + cardScreen(true) + "</main>" +
        '<footer class="ks-viewfoot"><p>Made with love by the ' + esc(HON.team) + " team.</p></footer></div>";
    } else {
      var body = s === "submit" ? submitScreen() : s === "card" ? cardScreen() : homeScreen();
      html = modeBar() + '<div class="ks-app">' + navBar() + '<main class="ks-main">' + body + "</main>" + footer() + "</div>";
    }
    app.innerHTML = html;
    requestAnimationFrame(icons);
    wireEvents();
    updateCountdown();
  }

  function wireEvents() {
    var s = state.screen;
    if (s === "submit") wireSubmit();
    if (s === "admin" && state.isAdmin) wireAdmin();
    if (s === "admin" && !state.isAdmin) wireLogin();
  }

  function wireSubmit() {
    var form = document.getElementById("msgForm");
    if (!form) return;
    var nameI = document.getElementById("f-name"), teamI = document.getElementById("f-team"),
        msgI = document.getElementById("f-message"), showI = document.getElementById("f-show"),
        countEl = document.getElementById("f-count");
    function syncCount() { if (countEl) countEl.textContent = (msgI.value.length) + " / 600"; }
    if (msgI) { msgI.addEventListener("input", function () { formState.message = msgI.value; syncCount(); }); syncCount(); }
    if (nameI) nameI.addEventListener("input", function () { formState.name = nameI.value; });
    if (teamI) teamI.addEventListener("input", function () { formState.team = teamI.value; });
    if (showI) showI.addEventListener("change", function () { formState.show = showI.checked; });

    bindDrop();

    form.addEventListener("submit", function (e) {
      e.preventDefault();
      document.getElementById("e-name").textContent = "";
      document.getElementById("e-message").textContent = "";
      var name = nameI.value.trim(), message = msgI.value.trim();
      var ok = true;
      if (!name) { document.getElementById("e-name").textContent = "Please add your name."; ok = false; }
      if (!message) { document.getElementById("e-message").textContent = "Please write a short message."; ok = false; }
      else if (message.length > 600) { document.getElementById("e-message").textContent = "Please keep it under 600 characters."; ok = false; }
      if (!ok) return;
      var btn = document.getElementById("f-submit");
      btn.disabled = true; btn.innerHTML = '<i data-lucide="loader"></i> Sending…'; icons();
      store.add({ name: name, team: teamI.value.trim(), message: message, show: showI.checked, photo: formState.photo || null })
        .then(function () {
          var first = name.split(" ")[0];
          formState = { name: "", team: "", message: "", show: true, photo: null };
          app.querySelector(".ks-main").innerHTML = successScreen(first);
          requestAnimationFrame(icons);
          var aa = document.getElementById("addAnother");
          if (aa) aa.addEventListener("click", function () { render(); });
        })
        .catch(function (err) {
          console.error(err); btn.disabled = false; btn.innerHTML = '<i data-lucide="send"></i> Add my message'; icons();
          toast("Couldn't send — please try again.");
        });
    });
  }

  function bindDrop() {
    var zone = document.getElementById("dropZone");
    if (!zone) return;
    var input = document.getElementById("f-photo");
    var label = document.getElementById("dropLabel");
    var clear = document.getElementById("dropClear");
    function handleFile(file) {
      if (!file) return;
      compressImage(file).then(function (data) {
        formState.photo = data; zone.innerHTML = dropInner(); requestAnimationFrame(icons); bindDrop();
      }).catch(function () { toast("That image couldn't be read."); });
    }
    if (input) input.addEventListener("change", function () { handleFile(input.files[0]); });
    if (clear) clear.addEventListener("click", function () { formState.photo = null; zone.innerHTML = dropInner(); requestAnimationFrame(icons); bindDrop(); });
    if (label) {
      ["dragover", "dragenter"].forEach(function (ev) { label.addEventListener(ev, function (e) { e.preventDefault(); label.classList.add("is-over"); }); });
      ["dragleave", "drop"].forEach(function (ev) { label.addEventListener(ev, function (e) { e.preventDefault(); label.classList.remove("is-over"); }); });
      label.addEventListener("drop", function (e) { if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]); });
    }
  }

  function wireLogin() {
    var form = document.getElementById("loginForm");
    if (!form) return;
    form.addEventListener("submit", function (e) {
      e.preventDefault();
      var pw = document.getElementById("pw").value;
      var errBox = document.getElementById("loginErr");
      errBox.innerHTML = "";
      auth.login(pw).catch(function (err) {
        var code = (err && err.code) || "";
        var msg;
        if (code.indexOf("invalid-credential") > -1 || code.indexOf("wrong-password") > -1)
          msg = "Email or password didn't match. Check the password, and that <b>adminEmail</b> in config.js is exactly the email of the user you created in Firebase \u2192 Authentication \u2192 Users.";
        else if (code.indexOf("user-not-found") > -1)
          msg = "No account found for the <b>adminEmail</b> in config.js. Create that user in Firebase \u2192 Authentication \u2192 Users (with your password).";
        else if (code.indexOf("invalid-email") > -1)
          msg = "The <b>adminEmail</b> in config.js isn't set to a real email address yet.";
        else if (code.indexOf("operation-not-allowed") > -1)
          msg = "Turn on <b>Email/Password</b> in Firebase \u2192 Authentication \u2192 Sign-in method.";
        else if (code.indexOf("too-many-requests") > -1)
          msg = "Too many attempts \u2014 wait a minute, then try again.";
        else if (code.indexOf("network") > -1)
          msg = "Network problem \u2014 check your connection and try again.";
        else msg = "Couldn't sign in" + (code ? " (" + code + ")" : "") + ".";
        if (code) msg += ' <span style="opacity:.65;font-size:var(--text-xs)">[' + code + "]</span>";
        errBox.innerHTML = '<div class="ks-login__err">' + msg + "</div>";
        document.getElementById("pw").value = "";
      });
    });
  }

  function wireAdmin() {
    [].forEach.call(document.querySelectorAll(".ks-admin__nav button"), function (b) {
      b.addEventListener("click", function () { state.adminTab = b.getAttribute("data-tab"); render(); });
    });
    var logout = document.getElementById("logout");
    if (logout) logout.addEventListener("click", function () { auth.logout().then(function () { go("home"); }); });
    [].forEach.call(document.querySelectorAll(".ks-arow__btn[data-act]"), function (b) {
      b.addEventListener("click", function () {
        var id = b.getAttribute("data-id"), act = b.getAttribute("data-act");
        if (act === "approve") store.update(id, { status: "approved" }).then(function () { toast("Message approved"); });
        else if (act === "hide") store.update(id, { status: "pending" }).then(function () { toast("Moved to pending"); });
        else if (act === "remove") { if (confirm("Remove this message permanently?")) store.remove(id).then(function () { toast("Message removed"); }); }
      });
    });
    var copy = document.getElementById("copyLink");
    if (copy) copy.addEventListener("click", function () {
      var inp = document.getElementById("shareLink");
      navigator.clipboard && navigator.clipboard.writeText(inp.value).then(function () { toast("Link copied"); }, function () { inp.select(); });
    });
  }

  /* ---------------- countdown ticker ---------------- */
  function updateCountdown() {
    var ms = Math.max(0, deadlineMs() - Date.now());
    var d = Math.floor(ms / 86400000), h = Math.floor((ms % 86400000) / 3600000),
        m = Math.floor((ms % 3600000) / 60000), s = Math.floor((ms % 60000) / 1000);
    function set(id, v) { var el = document.getElementById(id); if (el) el.textContent = v < 10 ? "0" + v : "" + v; }
    set("cd-d", d); set("cd-h", h); set("cd-m", m); set("cd-s", s);
    var nav = document.getElementById("navCount");
    if (nav) nav.textContent = d + "d " + h + "h " + m + "m";
  }
  var prevClosed = isClosed();
  setInterval(function () {
    updateCountdown();
    var closedNow = isClosed();
    if (closedNow !== prevClosed) { prevClosed = closedNow; render(); }
  }, 1000);

  /* ---------------- boot ---------------- */
  function boot() {
    state.screen = routeFromHash();
    state.booted = true;
    render();
    var splash = document.getElementById("splash");
    if (splash) { splash.classList.add("is-hidden"); setTimeout(function () { splash.remove(); }, 300); }
  }
  if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", boot);
  else boot();
})();

</script>
